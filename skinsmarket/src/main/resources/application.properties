# =============================================================================
# application.properties ? Marketplace de Skins
# =============================================================================

# -----------------------------------------------------------------------------
# Nombre de la aplicaciµn
# -----------------------------------------------------------------------------
spring.application.name=skins-marketplace

# -----------------------------------------------------------------------------
# Servidor
# del frontend que ya apunta a ese puerto.
# -----------------------------------------------------------------------------
server.port=4002

# -----------------------------------------------------------------------------
# Base de datos MySQL
# IMPORTANTE: cambiar el nombre de la base de datos (skinsmarketplace) y
# la contraseþa segºn el entorno local de cada desarrollador.
#
# Pasos para preparar la BD:
#   1. Abrir MySQL Workbench (o consola)
#   2. Ejecutar: CREATE DATABASE skinsmarketplace;
#   3. Asegurarse de que el usuario 'root' tenga permisos sobre esa BD
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/skinsmarketplace
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
# Dejar vacÚo si no tenÕs contraseþa en MySQL local, o poner la tuya:
spring.datasource.password=admin

# -----------------------------------------------------------------------------
# JPA / Hibernate
#
# ddl-auto=update ? Hibernate crea o actualiza las tablas automÃticamente
# al levantar el servidor segºn las entidades @Entity definidas.
# NO usar 'update' en producciµn (usar 'validate' o migraciones Flyway/Liquibase).
#
# show-sql=true ? Imprime en consola las queries SQL generadas por Hibernate.
# Ötil para debug y para ver quÕ estÃ ejecutando la app en cada request.
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Formato indentado del SQL en consola (mÃs legible que una sola lÚnea)
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------------------------------------------------
# JWT (JSON Web Token)
#
# secretKey: clave secreta usada para firmar y verificar los tokens JWT.
#   - Debe tener al menos 256 bits (64 caracteres hex) para el algoritmo HS256.
#   - NO compartir esta clave en repositorios pºblicos en producciµn.
#   - Se lee con @Value("${application.security.jwt.secretKey}") en JwtService.
#
# expiration: tiempo de vida del token en milisegundos.
#   - 86400000 ms = 24 horas
#   - Aumentar o disminuir segºn los requisitos de seguridad del proyecto.
# -----------------------------------------------------------------------------
application.security.jwt.secretKey=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# -----------------------------------------------------------------------------
# Multipart (subida de imÃgenes)
#
# Necesario para el endpoint POST /skins/admin/create-with-image que recibe
# archivos de imagen. Se aumenta el lÚmite a 10MB para imÃgenes de skins.
# -----------------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB