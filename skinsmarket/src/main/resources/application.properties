# =============================================================================
# application.properties ? Marketplace de Skins
# =============================================================================

# -----------------------------------------------------------------------------
# Nombre de la aplicación
# -----------------------------------------------------------------------------
spring.application.name=skins-marketplace

# -----------------------------------------------------------------------------
# Servidor
# del frontend que ya apunta a ese puerto.
# -----------------------------------------------------------------------------
server.port=4002

# -----------------------------------------------------------------------------
# Base de datos MySQL
# IMPORTANTE: cambiar el nombre de la base de datos (skinsmarketplace) y
# la contraseńa según el entorno local de cada desarrollador.
#
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/skinsmarketplace?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin


# -----------------------------------------------------------------------------
# JPA / Hibernate
#
# ddl-auto=update ? Hibernate crea o actualiza las tablas automáticamente
# al levantar el servidor según las entidades @Entity definidas.
# NO usar 'update' en producción (usar 'validate' o migraciones Flyway/Liquibase).
#
# show-sql=true ? Imprime en consola las queries SQL generadas por Hibernate.
# Útil para debug y para ver qué está ejecutando la app en cada request.
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Formato indentado del SQL en consola (más legible que una sola línea)
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------------------------------------------------
# JWT (JSON Web Token)
#
# secretKey: clave secreta usada para firmar y verificar los tokens JWT.
#   - Debe tener al menos 256 bits (64 caracteres hex) para el algoritmo HS256.
#   - NO compartir esta clave en repositorios públicos en producción.
#   - Se lee con @Value("${application.security.jwt.secretKey}") en JwtService.
#
# expiration: tiempo de vida del token en milisegundos.
#   - 86400000 ms = 24 horas
#   - Aumentar o disminuir según los requisitos de seguridad del proyecto.
# -----------------------------------------------------------------------------
application.security.jwt.secretKey=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# -----------------------------------------------------------------------------
# Multipart (subida de imágenes)
#
# Necesario para el endpoint POST /skins/admin/create-with-image que recibe
# archivos de imagen. Se aumenta el límite a 10MB para imágenes de skins.
# -----------------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB