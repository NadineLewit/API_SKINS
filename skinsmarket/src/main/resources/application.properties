# =============================================================================
# CONFIGURACIÓN DEL BOT DE STEAM Y MOCK
# =============================================================================

# -----------------------------------------------------------------------------
# Archivo orders.json compartido con el bot Node.js
#
# El backend Java escribe entradas acá cuando crea órdenes que necesitan al bot.
# El bot lee este archivo, manda las trade offers, y actualiza el estado.
#
# Path relativo al working directory del proyecto. Si lo cambiás, también hay
# que actualizar el bot Node.js para que lea desde la misma ruta.
# -----------------------------------------------------------------------------
bot.orders.file.path=data/orders.json

# -----------------------------------------------------------------------------
# Mock del bot (Steam bloqueado hasta el 10/06)
#
# mock.enabled=true     → el MockTradeScheduler simula al bot dentro de Java.
#                          Las órdenes avanzan automáticamente de estado.
# mock.enabled=false    → el bot Node.js real es el que procesa orders.json
#                          y actualiza estados. APAGAR DESPUÉS DEL 10/06.
#
# mock.bot.delay-seconds → cuántos segundos espera el mock entre transiciones.
#                          Subirlo si querés ver el flujo más despacio en demo.
# -----------------------------------------------------------------------------
mock.enabled=true
mock.bot.delay-seconds=5
