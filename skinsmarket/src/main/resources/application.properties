# =============================================================================
# application.properties - Marketplace de Skins
# =============================================================================

spring.application.name=skins-marketplace
server.port=4003
server.error.include-message=always
server.error.include-stacktrace=never
spring.devtools.add-properties=false

# -----------------------------------------------------------------------------
# Base de datos MySQL
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/skinsmarketplace?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -----------------------------------------------------------------------------
# JWT
# -----------------------------------------------------------------------------
application.security.jwt.secretKey=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

